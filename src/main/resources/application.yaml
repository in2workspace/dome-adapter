spring:
  application:
    name: dome-adapter
  main:
    web-application-type: reactive
  r2dbc:
    url: ${SPRING_R2DBC_URL:}
    username: ${SPRING_R2DBC_USERNAME:}
    password: ${SPRING_R2DBC_PASSWORD:}
  flyway:
    url: ${SPRING_FLYWAY_URL:}
    locations: classpath:db/migration
    default-schema: ${SPRING_FLYWAY_DEFAULT_SCHEMA:dome_adapter}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
          ssl:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:true}
            trust: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST:}
  messages:
    basename: messages/messages

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    es.altia.domeadapter: ${LOGGING_LEVEL_ES_ALTIA_DOMEADAPTER:INFO}
    org.springframework.security: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health, prometheus
      base-path: /
      path-mapping:
        health: health
        prometheus: prometheus
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /springdoc/api-docs
  swagger-ui:
    path: /springdoc/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

app:
  verifier-url: ${APP_VERIFIER_URL:}
  issuer-url: ${APP_ISSUER_URL:}
  default-lang: ${APP_DEFAULT_LANG:en}
  config-source: ${APP_CONFIG_SOURCE:yaml}
  issuer-dome-adapter-enabled: ${ISSUER_DOME_ADAPTER_ENABLED:false}
  mail:
    from: ${APP_MAIL_FROM:no-reply@example.com}

adapter-identity:
  credential-subject-did-key: ${ADAPTER_IDENTITY_CREDENTIAL_SUBJECT_DID_KEY:}
  jwt-credential: ${ADAPTER_IDENTITY_JWT_CREDENTIAL:}
  crypto:
    private-key: ${ADAPTER_IDENTITY_CRYPTO_PRIVATE_KEY:}

cors:
  external-allowed-origins: ${CORS_EXTERNAL_ALLOWED_ORIGINS:}

retry:
  label-upload:
    certifier-email: ${RETRY_LABEL_UPLOAD_CERTIFIER_EMAIL:}
    marketplace-email: ${RETRY_LABEL_UPLOAD_MARKETPLACE_EMAIL:}