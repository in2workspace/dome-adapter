spring:
  application:
    name: dome-adapter
  main:
    web-application-type: reactive
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/dome_adapter
    username: mock_user
    password: mock_password
  flyway:
    url: jdbc:postgresql://localhost:5432/dome_adapter
    locations: classpath:db/migration
    default-schema: dome_adapter
  mail:
    host: smtp.mock.local
    port: 587
    username: mock_mail_user
    password: mock_mail_password
    properties.mail.smtp:
      auth: true
      starttls.enable: true
      ssl.trust: smtp.mock.local
  messages:
    basename: messages/messages

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    es.altia.dome_adapter: INFO

server:
  port: 8081

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health, prometheus
      base-path: /
      path-mapping:
        health: health
        prometheus: prometheus
  endpoint:
    health:
      enabled: true
      show-details: always
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /springdoc/api-docs
  swagger-ui:
    path: /springdoc/swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

app:
  # URL of the external verifier (for token validation and M2M token acquisition)
  verifier-url: https://mock-verifier.example.com
  # URL of the external issuer (for forwarding issuance requests and for token validation)
  issuer-url: https://mock-issuer.example.com
  # Default language for email notifications (OPTIONAL, default: en)
  default-lang: en
  # Configuration source: yaml (OPTIONAL, default: yaml)
  config-source: yaml

issuer-identity:
  # DID:key of this service's credential subject (for M2M token)
  credential-subject-did-key: did:key:zMockCredentialSubjectDidKey123456789
  # Base64-encoded JWT machine credential (for M2M token)
  jwt-credential: eyJtb2NrIjoiand0LWNyZWRlbnRpYWwifQ==
  crypto:
    # Hex-encoded secp256r1 private key (for JWT signing)
    private-key: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

cors:
  # Origins allowed to call POST /api/v1/issuances (e.g. https://marketplace.dome-marketplace.eu)
  external-allowed-origins:
    - https://mock-marketplace.example.com
    - http://localhost:4200

retry:
  knowledge-base:
    # URL to the certification upload guide (included in failure/exhaustion emails)
    upload-certification-guide-url: https://mock-docs.example.com/certification-upload-guide
  label-upload:
    # Email address of the certifier to notify on delivery failures
    certifier-email: certifier.mock@example.com
    # Email address of the marketplace to notify on delivery failures
    marketplace-email: marketplace.mock@example.com